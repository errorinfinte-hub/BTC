name: dbt CI

# Map git branch → dbt target (must match outputs in secrets DBT_PROFILES_YML).
#
# Two branch concepts:
#   - PUSH_BRANCH: branch that introduced the commits (PR head, or the branch on push).
#   - MERGE_BRANCH: branch that receives the merge (PR base), or the same branch on push.
#
# Rule:
#   - pull_request → DBT_TARGET from MERGE_BRANCH (base): validate against the env you merge into.
#   - push         → DBT_TARGET from MERGE_BRANCH (= ref): validate against the env that was updated.

on:
  pull_request:
    branches:
      - master
      - main
      - dev
      - dev2
  push:
    branches:
      - master
      - main
      - dev
      - dev2

jobs:
  dbt-run:
    runs-on: ubuntu-latest
    environment: DBT_BTC

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve DBT_TARGET from push + merge branches
        shell: bash
        run: |
          EVENT="${{ github.event_name }}"

          if [[ "$EVENT" == "pull_request" ]]; then
            PUSH_BRANCH="${{ github.head_ref }}"
            MERGE_BRANCH="${{ github.base_ref }}"
            REF_FOR_TARGET="$MERGE_BRANCH"
            echo "Event: pull_request"
            echo "  PUSH_BRANCH (head):  $PUSH_BRANCH"
            echo "  MERGE_BRANCH (base): $MERGE_BRANCH"
            echo "  → DBT_TARGET follows MERGE_BRANCH (where this PR lands)"
          else
            PUSH_BRANCH="${{ github.ref_name }}"
            MERGE_BRANCH="${{ github.ref_name }}"
            REF_FOR_TARGET="$MERGE_BRANCH"
            echo "Event: push"
            echo "  PUSH_BRANCH / MERGE_BRANCH (ref): $PUSH_BRANCH"
            echo "  → DBT_TARGET follows the branch that was pushed"
          fi

          echo "PUSH_BRANCH=$PUSH_BRANCH" >> "$GITHUB_ENV"
          echo "MERGE_BRANCH=$MERGE_BRANCH" >> "$GITHUB_ENV"

          case "$REF_FOR_TARGET" in
            main|master)
              TARGET=prod
              ;;
            dev2)
              TARGET=dev2
              ;;
            dev)
              TARGET=dev
              ;;
            *)
              echo "::error::No dbt target mapping for MERGE_BRANCH/ref '$REF_FOR_TARGET'. Add it to the case in dbt-ci.yml."
              exit 1
              ;;
          esac

          echo "DBT_TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "Resolved DBT_TARGET=$TARGET"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-snowflake

      - name: Set up dbt profile and private key
        run: |
          mkdir -p ~/.dbt
          echo "$DBT_PROFILES_YML" > ~/.dbt/profiles.yml
          echo "$DBT_PRIVATE_KEY" > ~/.dbt/rsa_key
          chmod 600 ~/.dbt/rsa_key
        env:
          DBT_PROFILES_YML: ${{ secrets.DBT_PROFILES_YML }}
          DBT_PRIVATE_KEY: ${{ secrets.DBT_PRIVATE_KEY }}

      - name: Install dbt deps
        run: dbt deps

      - name: dbt debug
        run: dbt debug --target "$DBT_TARGET"

      - name: dbt run
        run: dbt run --target "$DBT_TARGET"
