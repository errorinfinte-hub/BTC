name: dbt CI

# Map git branch → dbt target (must match outputs/targets in ~/.dbt profiles.yml in CI secrets).
# - PRs: target follows the base branch (environment you merge into).
# - Push: target follows the branch that received the push.

on:
  pull_request:
    branches:
      - master
      - main
      - dev
      - dev2
  push:
    branches:
      - master
      - main
      - dev
      - dev2

jobs:
  dbt-run:
    runs-on: ubuntu-latest
    environment: DBT_BTC

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve DBT_TARGET from branch
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            REF="${{ github.base_ref }}"
            echo "Event: pull_request — using base branch (merge target): $REF"
          else
            REF="${{ github.ref_name }}"
            echo "Event: push — using branch: $REF"
          fi

          case "$REF" in
            main|master)
              TARGET=prod
              ;;
            dev2)
              TARGET=dev2
              ;;
            dev)
              TARGET=dev
              ;;
            *)
              echo "::error::No dbt target mapping for branch '$REF'. Add it to the case in dbt-ci.yml."
              exit 1
              ;;
          esac

          echo "DBT_TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "Resolved DBT_TARGET=$TARGET"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-snowflake

      - name: Set up dbt profile and private key
        run: |
          mkdir -p ~/.dbt
          echo "$DBT_PROFILES_YML" > ~/.dbt/profiles.yml
          echo "$DBT_PRIVATE_KEY" > ~/.dbt/rsa_key
          chmod 600 ~/.dbt/rsa_key
        env:
          DBT_PROFILES_YML: ${{ secrets.DBT_PROFILES_YML }}
          DBT_PRIVATE_KEY: ${{ secrets.DBT_PRIVATE_KEY }}

      - name: Install dbt deps
        run: dbt deps

      - name: dbt debug
        run: dbt debug --target "$DBT_TARGET"

      - name: dbt run
        run: dbt run --target "$DBT_TARGET"
